[book]
title = "ferogram"
authors = ["Ankit Chaubey"]
language = "en"
src = "src"

[output.html]
git-repository-url = "https://github.com/ankit-chaubey/ferogram"
edit-url-template = "https://github.com/ankit-chaubey/ferogram/edit/main/docs/{path}"
additional-css = ["theme/custom.css"]
additional-js  = ["theme/custom.js"]
default-theme          = "navy"
preferred-dark-theme   = "navy"
no-section-label       = false
# Slightly larger base font so custom.css has a comfortable baseline
mathjax-support        = false

[output.html.fold]
enable = true
level  = 1

[output.html.search]
enable             = true
limit-results      = 20
teaser-word-count  = 30
use-boolean-and    = true
boost-title        = 2
boost-hierarchy    = 1
boost-paragraph    = 1
expand             = true
heading-split-level = 3
